<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My GitHub Pages Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }

    h1 {
      margin-top: 0;
      color: #333;
    }

    p {
      color: #666;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #007acc;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #005f99;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hello GitHub Pages 👋</h1>
    <p>If you can see this, your site is working!</p>
    <button onclick="alert('It works! 🚀')">Click me</button>
  </div>

</body>
</html>
